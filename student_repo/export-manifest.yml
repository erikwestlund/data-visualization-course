# Student repository export manifest.
#
# This file documents the intended student-facing export rules. The build script
# also reads `target_root_default`, `must_exist_after_export`, and
# `must_not_exist_after_export` from this file.

target_root_default: ~/Code/Courses/data-visualization-2026

# Day-level publishing gate for the public/student repo.
# This controls copied module folders, rendered module HTML, practice templates,
# and rendered slides. Assignments, data, codebooks, and the syllabus are always
# exported. Day 2 maps to modules/02_categorical-data, modules/03_continuous-data,
# practice/02_categorical-data, practice/03_continuous-data, and
# slides/day-02-categorical-and-continuous.html.
# Valid values: preclass, day-01, day-02, day-03, day-04, day-05, all.
# For now, keep only setup/preclass and Day 1 public.
published_days:
  - preclass
  - day-01

# Editable/source materials students may open and run.
# Day-controlled source folders are filtered by `published_days` during export.
source_exports:
  - modules/**/*.qmd
  - practice/templates/**/*.qmd
  - install-packages.R
  - updater.R
  - README.md

# Rendered instructor-owned artifacts.
rendered_exports:
  - modules/rendered/index.html
  - modules/rendered/**/*.html
  - syllabus.html
  - slides/*.html
  - assignments/*.html
  - data/data.html
  - data/codebooks/*.html

# Student-owned files are ignored by Git and should not be overwritten.
student_work:
  - practice/work/
  - docs/

# Explicit checks for exceptions/default breaks.
must_exist_after_export:
  - modules/00_preclass-tech-check/01_pre-class-directions.qmd
  - modules/00_preclass-tech-check/02_setup-check.qmd
  - modules/01-workflow-and-basics/01_course-materials.qmd
  - modules/01-workflow-and-basics/02_first-visualization.qmd
  - practice/templates/01-workflow-and-basics/01_explore-and-visualize.qmd
  - slides/day-01-intro-and-workflow.html
  - assignments/problem-set-1.html
  - install-packages.R
  - updater.R
  - data-visualization-course.Rproj
  - data-visualization-course.code-workspace
  - data/data.html
  - modules/rendered/index.html
  - modules/rendered/01-workflow-and-basics/01_course-materials.html
  - modules/rendered/01-workflow-and-basics/02_first-visualization.html

must_not_exist_after_export:
  - docs/modules/00_preclass-tech-check/01_pre-class-directions.html
  - docs/modules/00_preclass-tech-check/02_setup-check.html
  - modules/00_preclass-tech-check/01_pre-class-directions.html
  - modules/00_preclass-tech-check/02_setup-check.html
  - modules/01-workflow-and-basics/01_course-materials.html
  - rendered/index.html
  - rendered/modules/01-workflow-and-basics/01_course-materials.html
  - assignments/problem-set-1.qmd
  - slides/day-01-intro-and-workflow.qmd
  - slides/day-02-categorical-and-continuous.html
  - slides/day-03-comparison-and-association.html
  - slides/day-04-change-space-flow.html
  - slides/day-05-communication-and-studio.html
  - modules/02_categorical-data/01_counts-and-ordering.qmd
  - modules/03_continuous-data/01_histograms-and-density.qmd
  - modules/rendered/02_categorical-data/01_counts-and-ordering.html
  - modules/rendered/03_continuous-data/01_histograms-and-density.html
  - practice/templates/02_categorical-data/01_counts-and-ordering-practice.qmd
  - practice/templates/03_continuous-data/01_histograms-and-density-practice.qmd
  - data/codebooks/prams_2011_selected.md
